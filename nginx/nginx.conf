user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format with non-200 logging filter
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    log_format  non200  '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  non200 if=$log_non200;

    # Filter for non-200 status logging
    map $status $log_non200 {
        ~^[23]  0;
        default 1;
    }

    # Gzip compression settings
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript
               application/x-javascript application/xml application/json
               application/rss+xml image/svg+xml font/woff font/woff2;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # File transfer optimization
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Connection timeout settings
    keepalive_timeout 30;

    # Open file cache settings
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Buffer settings for large files (photos/videos)
    client_body_buffer_size 128k;
    client_max_body_size 500M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    include /etc/nginx/conf.d/*.conf;
}

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-photoview
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - /opt/nginx-photoview/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/nginx-photoview/conf.d:/etc/nginx/conf.d:ro
      - /etc/acme/funspace.duckdns.org_ecc:/etc/ssl/acme:ro
      - /opt/nginx-photoview/logs:/var/log/nginx
    networks:
      - photoview_net

networks:
  photoview_net:
    external: true

server {
    listen 443 ssl;
    http2 on;
    server_name funspace.duckdns.org;

    # SSL (используем существующие сертификаты)
    ssl_certificate      /etc/acme/funspace.duckdns.org_ecc/fullchain.cer;
    ssl_certificate_key  /etc/acme/funspace.duckdns.org_ecc/funspace.duckdns.org.key;

    # Photoview proxy
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket support для GraphQL subscriptions
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Увеличенные таймауты для больших фото
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}